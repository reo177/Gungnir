{% extends "base.html" %}
{% block title %}サーバー選択 | SecurityBot{% endblock %}
{% block content %}
<div class="page-container">
  <div class="page-header"><h1>サーバーを選択</h1><p>管理権限を持つサーバーが表示されます</p></div>
  {% if guilds %}
    <div class="guild-grid">
      {% for g in guilds %}
        <a href="/dashboard/{{ g.id }}" class="guild-card">
          <img src="{{ g.icon_url }}" alt="{{ g.name }}" class="guild-icon">
          <div class="guild-name">{{ g.name }}</div>
          <div class="guild-arrow">→</div>
        </a>
      {% endfor %}
      <a href="{{ bot_invite }}" target="_blank" class="guild-card guild-card-add">
        <div class="guild-icon guild-icon-add">+</div>
        <div class="guild-name">サーバーを追加</div>
      </a>
    </div>
  {% else %}
    <div class="empty-state">
      <div class="empty-icon">🏚️</div>
      <p>管理権限を持つサーバーが見つかりません</p>
      <a href="{{ bot_invite }}" target="_blank" class="btn btn-primary">ボットをサーバーに追加</a>
    </div>
  {% endif %}
</div>
{% endblock %}
