<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecurityBot{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <span class="brand-icon">🛡️</span>
    <span class="brand-name">SecurityBot</span>
  </a>
  <div class="navbar-right">
    {% if user %}
      <a href="/dashboard" class="nav-link">ダッシュボード</a>
      <div class="user-info">
        <img src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png?size=32"
             onerror="this.src='https://ui-avatars.com/api/?name={{ user.username|urlencode }}&background=5865F2&color=fff&size=32'"
             alt="avatar" class="user-avatar">
        <span class="user-name">{{ user.username }}</span>
        <a href="/auth/logout" class="btn btn-sm btn-outline">ログアウト</a>
      </div>
    {% else %}
      <a href="/auth/login" class="btn btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right:6px"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.053a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discordでログイン
      </a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
